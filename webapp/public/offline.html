<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#08131f" />
    <title>Danang Guide — офлайн</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08131f;
        --bg-soft: rgba(9, 22, 37, 0.86);
        --line: rgba(255, 255, 255, 0.12);
        --text: #fff8ea;
        --text-soft: rgba(255, 246, 228, 0.76);
        --accent: #ffd07a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 22% 8%, rgba(255, 176, 64, 0.2), transparent 30%),
          radial-gradient(circle at 85% 100%, rgba(24, 121, 255, 0.16), transparent 36%),
          linear-gradient(180deg, #08131f 0%, #050b12 100%);
        color: var(--text);
      }
      .offline-card {
        width: min(100%, 440px);
        padding: 28px;
        border-radius: 28px;
        border: 1px solid var(--line);
        background: var(--bg-soft);
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.32);
        text-align: center;
        backdrop-filter: blur(18px);
      }
      .offline-logo {
        width: min(100%, 220px);
        margin: 0 auto 18px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.6rem, 4vw, 2rem);
        line-height: 1.05;
      }
      p {
        margin: 0;
        color: var(--text-soft);
        line-height: 1.6;
      }
      .offline-actions {
        display: flex;
        gap: 12px;
        margin-top: 22px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .offline-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 132px;
        padding: 12px 16px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
      }
      .offline-button--accent {
        background: linear-gradient(135deg, #ffd07a, #ff9d63);
        color: #162434;
        border-color: transparent;
      }
    </style>
  </head>
  <body>
    <section class="offline-card">
      <img class="offline-logo" src="/danang-guide-logo.png" alt="Danang Guide" />
      <h1>Сейчас нет сети</h1>
      <p>
        Приложение сохранило часть данных, но для новых страниц и актуального контента нужно подключение к интернету.
      </p>
      <div class="offline-actions">
        <button class="offline-button offline-button--accent" type="button" onclick="window.location.reload()">
          Попробовать снова
        </button>
        <a class="offline-button" href="/">На главную</a>
      </div>
    </section>
  </body>
</html>
